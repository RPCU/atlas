apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: jellystat-db
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: jellystat-db
    template:
      # CNPG bootstrap.initdb.secret expects a basic-auth secret with
      # username/password. The extra JWT_SECRET key is consumed by the
      # jellystat app deployment.
      type: kubernetes.io/basic-auth
      data:
        username: "{{ .username }}"
        password: "{{ .password }}"
        JWT_SECRET: "{{ .jwtSecret }}"
  data:
    - secretKey: username
      remoteRef:
        key: secrets-production/jellystat/config
        property: username
    - secretKey: password
      remoteRef:
        key: secrets-production/jellystat/config
        property: password
    - secretKey: jwtSecret
      remoteRef:
        key: secrets-production/jellystat/config
        property: jwtSecret
