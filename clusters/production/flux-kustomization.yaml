apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: atlas
  namespace: flux-system
  annotations:
    kustomize.toolkit.fluxcd.io/prune: disabled
spec:
  interval: 10m
  sourceRef:
    kind: GitRepository
    name: atlas
    namespace: flux-system
  path: ./clusters/production
  prune: true
