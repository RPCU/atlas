# Pushes the Crossplane-generated jellyfin OIDC connection secret UP into the
# shared mgmt Vault (KV-v2), so the client_id/client_secret land at
# secrets-production/jellyfin/oidc and can be consumed elsewhere.
#
# Reverse of an ExternalSecret: source is the K8s Secret jellyfin-oidc (written
# by the Oidc resource's writeConnectionSecretToRef in
# clusters/production/crossplane/oidc-jellyfin.yaml), destination is Vault via
# the vault-backend ClusterSecretStore. Lives here (not in crossplane/) because
# a PushSecret must be in the same namespace as its source secret (media).
#
# NOTE: this requires the vault-backend store's Vault role/policy to allow
# create+update on secrets-production/jellyfin/oidc. ExternalSecrets only need
# read, so if the store is read-only the push will fail until the policy is
# widened.
#
# Key names follow the Upjet convention (Terraform sensitive attributes exported
# as attribute.<name>). Verify against the live secret if the push errors:
#   kubectl get secret jellyfin-oidc -n media -o jsonpath='{.data}'
apiVersion: external-secrets.io/v1alpha1
kind: PushSecret
metadata:
  name: jellyfin-oidc
spec:
  refreshInterval: 1h
  secretStoreRefs:
    - name: vault-backend
      kind: ClusterSecretStore
  selector:
    secret:
      name: jellyfin-oidc
  data:
    - match:
        secretKey: attribute.client_id
        remoteRef:
          remoteKey: secrets-production/jellyfin/oidc
          property: clientId
    - match:
        secretKey: attribute.client_secret
        remoteRef:
          remoteKey: secrets-production/jellyfin/oidc
          property: clientSecret
