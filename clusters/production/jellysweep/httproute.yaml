apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: jellysweep
spec:
  parentRefs:
    - name: https-external
      namespace: kgateway-system
  hostnames:
    - 'jellysweep.rpcu.io'
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: jellysweep
          port: 3002
