apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: jellysweep-secrets
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: jellysweep-secrets
  data:
    # jellysweep-specific secrets (populated out of band in Vault):
    #   session-key : `openssl rand -base64 32`
    #   jellyfin-api-key / seerr-api-key / jellystat-api-key
    - secretKey: session-key
      remoteRef:
        key: secrets-production/jellysweep/config
        property: sessionKey
    - secretKey: jellyfin-api-key
      remoteRef:
        key: secrets-production/jellysweep/config
        property: jellyfinApiKey
    - secretKey: seerr-api-key
      remoteRef:
        key: secrets-production/jellysweep/config
        property: seerrApiKey
    - secretKey: jellystat-api-key
      remoteRef:
        key: secrets-production/jellysweep/config
        property: jellystatApiKey
    # Reused existing app API keys already stored in Vault:
    - secretKey: radarr-api-key
      remoteRef:
        key: secrets-production/radarr/config
        property: API_KEY
    - secretKey: sonarr-api-key
      remoteRef:
        key: secrets-production/sonarr/config
        property: API_KEY
