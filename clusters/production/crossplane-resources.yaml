apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: crossplane-resources
  namespace: flux-system
spec:
  interval: 10m0s
  sourceRef:
    kind: GitRepository
    name: atlas
    namespace: flux-system
  path: ./clusters/production/crossplane
  prune: false
  timeout: 5m
  dependsOn:
    - name: crossplane-zitadel
