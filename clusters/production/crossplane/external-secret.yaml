# Pulls the Crossplane Zitadel provider admin credentials out of the shared mgmt
# Vault (via the vault-backend ClusterSecretStore that ESO provides on this
# cluster) and materializes them as the crossplane-provider-zitadel Secret in the
# zitadel namespace — the secret the ProviderConfig (providerConfig.yaml) consumes
# via its secretRef (key: credentials). This replaces the previous manual-secret
# convention.
#
# The Vault KV-v2 path secrets-production/zitadel/crossplane must hold a
# `credentials` property containing the Zitadel provider's JWT-profile JSON blob
# (the same content that used to be placed by hand into the secret's `credentials`
# key). Populate it out of band in Vault.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: crossplane-provider-zitadel
  namespace: zitadel
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: crossplane-provider-zitadel
  data:
    - secretKey: credentials
      remoteRef:
        key: secrets-production/zitadel/crossplane
        property: credentials
