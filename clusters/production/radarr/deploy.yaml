apiVersion: apps/v1
kind: Deployment
metadata:
  name: radarr
  labels:
    app: radarr
spec:
  strategy:
    type: Recreate
  replicas: 1
  selector:
    matchLabels:
      app: radarr
  template:
    metadata:
      labels:
        app: radarr
    spec:
      securityContext:
        fsGroup: 1000
      containers:
        - name: radarr
          image: ghcr.io/linuxserver/radarr:6.2.1-nightly
          resources:
            requests:
              memory: 800Mi
              cpu: 100m
            limits:
              memory: 800Mi
              cpu: 1
          ports:
            - name: radarr
              containerPort: 7878
          env:
            - name: AUTHENTICATION_METHOD
              value: "External"
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: TZ
              value: "Europe/Paris"
            - name: UMASK
              value: "022"
            - name: API_KEY
              valueFrom:
                secretKeyRef:
                  name: radarr-secrets
                  key: API_KEY
          readinessProbe:
            tcpSocket:
              port: radarr
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: radarr
            initialDelaySeconds: 15
            periodSeconds: 20
          lifecycle:
            postStart:
              exec:
                command:
                  - sh
                  - -c
                  - |
                    while [ ! -f /config/config.xml ]; do
                      echo "Waiting for config.xml creation..."
                      sleep 1
                    done
                    sed -i "s/<AuthenticationMethod>.*<\/AuthenticationMethod>/<AuthenticationMethod>$AUTHENTICATION_METHOD<\/AuthenticationMethod>/g" /config/config.xml
                    sed -i "s/<ApiKey>.*<\/ApiKey>/<ApiKey>$API_KEY<\/ApiKey>/g" /config/config.xml
                    echo "Waiting for Radarr API..."
                    until curl -sf http://localhost:7878/api/v3/system/status -H "X-Api-Key: $API_KEY" > /dev/null 2>&1; do sleep 2; done
                    HAS_MOVIES=$(curl -sf http://localhost:7878/api/v3/rootfolder -H "X-Api-Key: $API_KEY" | grep -c '"/movies"')
                    if [ "$HAS_MOVIES" -eq 0 ]; then
                      echo "Adding /movies root folder via API..."
                      curl -sf -X POST http://localhost:7878/api/v3/rootfolder \
                        -H "Content-Type: application/json" \
                        -H "X-Api-Key: $API_KEY" \
                        -d '{"path":"/movies"}'
                    else
                      echo "/movies root folder already exists."
                    fi
          volumeMounts:
            - name: config
              mountPath: /config
            - name: movies
              mountPath: /movies
            - name: qbittorrent-downloads
              mountPath: /downloads
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: radarr-config
        - name: movies
          persistentVolumeClaim:
            claimName: movies
        - name: qbittorrent-downloads
          persistentVolumeClaim:
            claimName: qbittorrent-downloads
