apiVersion: apps/v1
kind: Deployment
metadata:
  name: radarr
  labels:
    app: radarr
spec:
  strategy:
    type: Recreate
  replicas: 1
  selector:
    matchLabels:
      app: radarr
  template:
    metadata:
      labels:
        app: radarr
    spec:
      containers:
        - name: radarr
          image: ghcr.io/linuxserver/radarr:6.4.0-nightly
          resources:
            requests:
              memory: 800Mi
              cpu: 100m
            limits:
              memory: 800Mi
              cpu: 1
          ports:
            - name: radarr
              containerPort: 7878
          env:
            - name: AUTHENTICATION_METHOD
              value: 'External'
            - name: PUID
              value: '1000'
            - name: PGID
              value: '1000'
            - name: TZ
              value: 'Europe/Paris'
            - name: UMASK
              value: '022'
            - name: API_KEY
              valueFrom:
                secretKeyRef:
                  name: radarr-secrets
                  key: API_KEY
            - name: DOTNET_SYSTEM_IO_DISABLESTATX
              value: '1'
          readinessProbe:
            tcpSocket:
              port: radarr
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: radarr
            initialDelaySeconds: 15
            periodSeconds: 20
          lifecycle:
            postStart:
              exec:
                command:
                  - sh
                  - -c
                  - |
                    while [ ! -f /config/config.xml ]; do
                      echo "Waiting for config.xml creation..."
                      sleep 1
                    done
                    sed -i "s/<AuthenticationMethod>.*<\/AuthenticationMethod>/<AuthenticationMethod>$AUTHENTICATION_METHOD<\/AuthenticationMethod>/g" /config/config.xml
                    sed -i "s/<ApiKey>.*<\/ApiKey>/<ApiKey>$API_KEY<\/ApiKey>/g" /config/config.xml
                    echo "Waiting for Radarr API..."
                    until curl -sf http://localhost:7878/api/v3/system/status -H "X-Api-Key: $API_KEY" > /dev/null 2>&1; do sleep 2; done
          volumeMounts:
            - name: config
              mountPath: /config
            - name: media
              mountPath: /media
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: radarr-config
        - name: media
          persistentVolumeClaim:
            claimName: media
