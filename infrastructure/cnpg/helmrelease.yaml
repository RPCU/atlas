---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cloudnative-pg
  namespace: cnpg-system
spec:
  interval: 1h
  chart:
    spec:
      chart: cloudnative-pg
      version: 0.29.0
      sourceRef:
        kind: HelmRepository
        name: cloudnative-pg
        namespace: cnpg-system
  install:
    crds: Create
  upgrade:
    crds: CreateReplace
  values:
    crds:
      create: true
    resources:
      requests:
        cpu: 100m
        memory: 200Mi
      limits:
        memory: 200Mi
