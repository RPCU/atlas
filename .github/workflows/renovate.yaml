name: renovate
on:
  workflow_dispatch:
    inputs:
      dryRun:
        description: "Dry run mode (no PRs/branches created)"
        type: choice
        default: "disabled"
        options:
          - "disabled"
          - "full"
          - "extract"
      logLevel:
        description: "Renovate log level"
        type: choice
        default: "info"
        options:
          - "debug"
          - "info"
  schedule:
    # Run hourly; Renovate's own `schedule` in renovate.json5 (Monday early
    # morning, Europe/Paris) gates when branches/PRs are actually created.
    - cron: "0 * * * *"
permissions:
  contents: "read"
jobs:
  renovate:
    runs-on: ubuntu-latest
    concurrency:
      group: renovate
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Mint a short-lived GitHub App installation token (same pattern as
      # bealv's updatecli workflow). Uses the org's `rpcu-bot` App
      # (app_id 3164565), which is installed org-wide and holds the
      # Contents + Pull requests + Issues + Actions write permissions Renovate
      # needs. Reuses the existing ORG-level secrets already granted to atlas:
      #   APP_ID       - the rpcu-bot App's numeric App ID
      #   PRIVATE_KEY  - the rpcu-bot App's private key (PEM)
      - name: Generate a token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.PRIVATE_KEY }}

      - name: Self-hosted Renovate
        uses: renovatebot/github-action@v46.1.18
        with:
          token: ${{ steps.app-token.outputs.token }}
        env:
          RENOVATE_REPOSITORIES: ${{ github.repository }}
          # RENOVATE_DRY_RUN only accepts null/extract/lookup/full. The
          # workflow input's "disabled" choice must map to an EMPTY value
          # (a real run) — passing the literal "disabled" is treated as
          # truthy and forces dry-run. Only forward the real dry-run modes.
          RENOVATE_DRY_RUN: ${{ (github.event.inputs.dryRun == 'full' || github.event.inputs.dryRun == 'extract') && github.event.inputs.dryRun || '' }}
          # A MANUAL (workflow_dispatch) run bypasses the `schedule` in
          # renovate.json5 so you can force PRs on demand; scheduled cron runs
          # still respect the Monday-morning window.
          RENOVATE_FORCE: ${{ github.event_name == 'workflow_dispatch' && '{"schedule":null}' || '' }}
          LOG_LEVEL: ${{ github.event.inputs.logLevel || 'info' }}
          # Attribute commits/PRs to the App (self-hosted bot identity).
          RENOVATE_GIT_AUTHOR: "${{ steps.app-token.outputs.app-slug }}[bot] <${{ steps.app-token.outputs.app-slug }}@users.noreply.github.com>"
          RENOVATE_USERNAME: "${{ steps.app-token.outputs.app-slug }}[bot]"
